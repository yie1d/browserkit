name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: bk.exe
            archive: bk-windows-x86_64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: bk
            archive: bk-linux-x86_64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: bk
            archive: bk-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: bk
            archive: bk-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          tar -czf ${{ matrix.archive }} -C "$(dirname $bin)" "$(basename $bin)"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
