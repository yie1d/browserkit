name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check version matches tag
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          tag="${GITHUB_REF_NAME#v}"
          test "$version" = "$tag" || {
            echo "::error::Cargo.toml version $version does not match tag $GITHUB_REF_NAME"
            exit 1
          }

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings

      - name: Install Rust 1.75
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.75.0
      - run: cargo +1.75.0 check --all-targets --locked

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: bk.exe
            archive: bk-windows-x86_64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: bk
            archive: bk-linux-x86_64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: bk
            archive: bk-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: bk
            archive: bk-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          tar -czf ${{ matrix.archive }} -C "$(dirname $bin)" "$(basename $bin)"

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release artifacts
        shell: bash
        run: |
          expected=(
            bk-windows-x86_64.zip
            bk-linux-x86_64.tar.gz
            bk-macos-x86_64.tar.gz
            bk-macos-aarch64.tar.gz
          )
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq "${#expected[@]}"
          for archive in "${expected[@]}"; do
            test -f "dist/$archive"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
